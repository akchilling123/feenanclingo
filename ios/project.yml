name: Feenancelingo
options:
  bundleIdPrefix: com.amirkhod
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.3"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"

targets:
  Feenancelingo:
    type: application
    platform: iOS
    sources:
      - path: Feenancelingo
        excludes:
          - Resources
    resources:
      - path: Feenancelingo/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amirkhod.feenancelingo
        DEVELOPMENT_TEAM: NH7KUMS5ZH
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_LSRequiresIPhoneOS: true
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
    dependencies:
      - package: Supabase
